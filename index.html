<link rel="stylesheet" href="assets/css/main.css">
<link rel="preconnect" href="https://cdn.staticfile.org">
<link rel="preconnect" href="https://unpkg.com">
<script>
  // CDN 容错加载链：国内优先 staticfile，失败回退 unpkg / jsdelivr
  // 不阻塞页面渲染，加载完成后通过事件触发组件渲染
  (function () {
    function load(urls, onload, name) {
      var i = 0;
      function tryNext() {
        if (i >= urls.length) {
          console.warn("[CDN] " + name + " 全部失败");
          window.dispatchEvent(new CustomEvent(name + "Failed"));
          return;
        }
        var s = document.createElement("script");
        s.src = urls[i++];
        s.async = false;
        s.onload = function () { onload && onload(); window.dispatchEvent(new CustomEvent(name + "Ready")); };
        s.onerror = tryNext;
        document.head.appendChild(s);
      }
      tryNext();
    }
    load([
      "https://cdn.staticfile.org/marked/4.3.0/marked.min.js",
      "https://unpkg.com/marked@4/marked.min.js",
      "https://cdn.jsdelivr.net/npm/marked@4/marked.min.js"
    ], null, "marked");
    load([
      "https://cdn.staticfile.org/mermaid/10.6.1/mermaid.min.js",
      "https://unpkg.com/mermaid@10/dist/mermaid.min.js",
      "https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"
    ], null, "mermaid");
  })();
</script>
</head>

<!-- AI Modal -->
<div id="aiModal" class="modal hidden">
  <div class="modal-backdrop"></div>
  <div class="modal-card">
    <div class="modal-head">
      <h3>💬 问问 DeepSeek</h3>
      <button id="aiModalClose" class="icon-btn">✕</button>
    </div>
    <div class="modal-body">
      <div id="aiKeyArea">
        <p class="hint">首次使用需配置 DeepSeek API Key（仅保存在你本地浏览器）：</p>
        <input id="apiKeyInput" type="password" placeholder="sk-xxxxxxxxxxxxxxxx" />
        <button id="apiKeySave" class="btn-primary">保存 Key</button>
        <p class="hint mini">没有 Key？<a href="https://platform.deepseek.com/api_keys" target="_blank">点这里 1 分钟注册</a> · 新用户有免费额度</p>
      </div>
      <div id="aiChatArea" class="hidden">
        <div id="aiMessages" class="ai-messages"></div>
        <div class="ai-input-row">
          <textarea id="aiInput" placeholder="例如：帮我写一封拒绝同事请求的邮件，语气委婉..." rows="3"></textarea>
          <button id="aiSend" class="btn-primary">发送</button>
        </div>
        <div class="ai-quick">
          <button class="chip" data-q="用 5 句话解释什么是 AI Agent">什么是 Agent</button>
          <button class="chip" data-q="给我一个会议纪要的提示词模板">纪要模板</button>
          <button class="chip" data-q="帮我把这段话翻译成正式英文：">翻译</button>
          <button class="chip" data-q="角色：你是一名资深律师。任务：">律师角色</button>
        </div>
      </div>
    </div>
  </div>
</div>
